<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Power Up's</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #111; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    #gate {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
    }
    #gate h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    #gate p { color: #aaa; margin-bottom: 1.5rem; }
    #gate input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      margin-bottom: 1rem;
      text-align: center;
      letter-spacing: 0.1em;
    }
    #gate button {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    #gate button:hover { background: #c1121f; }
    #error { color: #e63946; margin-top: 1rem; font-size: 0.9rem; min-height: 1.2rem; }

    #used-screen {
      display: none;
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    #used-screen h1 { font-size: 1.8rem; margin-bottom: 1rem; }
    #used-screen p { color: #aaa; }

    #game-container {
      display: none;
      width: 100vw;
      height: 100vh;
    }
    #game-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div id="gate">
    <h1>⚡ Power Up's</h1>
    <p>Introduce tu código de acceso</p>
    <input type="text" id="token-input" placeholder="Tu código" autocomplete="off" />
    <button onclick="checkToken()">Entrar</button>
    <div id="error"></div>
  </div>

  <div id="used-screen">
    <h1>⚡ Power Up's</h1>
    <p>Ya has abierto tus Power Up's</p>
  </div>

  <div id="game-container">
    <iframe id="game-frame" src="game/index.html" allowfullscreen></iframe>
  </div>

    function checkToken() {
      const input = document.getElementById("token-input").value.trim().toUpperCase();
      const errorEl = document.getElementById("error");

      if (!(input in TOKENS)) {
        errorEl.textContent = "Código incorrecto.";
        return;
      }

      const usedKey = "used_" + input;
      if (localStorage.getItem(usedKey)) {
        showUsed();
        return;
      }

      localStorage.setItem(usedKey, "1");
      showGame();
    }

    function showUsed() {
      document.getElementById("gate").style.display = "none";
      document.getElementById("used-screen").style.display = "block";
    }

    function showGame() {
      document.getElementById("gate").style.display = "none";
      document.getElementById("game-container").style.display = "block";
    }

    document.getElementById("token-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") checkToken();
    });
